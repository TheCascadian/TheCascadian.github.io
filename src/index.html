<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factory Automation Portfolio</title>
    <style>
        :root {
            --bg-color: #2b2b2b;
            --zone-bg: #444444;
            --zone-border: #666666;
            --station-bg: #888888;
            --station-hover: #aaaaaa;
            --accent: #00ADB5; /* Teal */
            --text-light: #ffffff;
            --text-dark: #222222;
            --conveyor: #333333;
            --conveyor-belt: #111111;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            width: 100%;
            max-width: 1000px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: var(--station-bg);
            font-size: 0.9rem;
        }

        /* SVG Factory Styles */
        .factory-container {
            width: 100%;
            max-width: 1000px;
            background-color: #333;
            border: 2px solid var(--zone-border);
            border-radius: 4px;
            overflow: hidden;
        }

        svg {
            display: block;
            width: 100%;
            height: auto;
        }

        .zone-rect {
            fill: var(--zone-bg);
            stroke: var(--zone-border);
            stroke-width: 2;
            stroke-dasharray: 8 4;
        }

        .zone-label {
            fill: #cccccc;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .station rect {
            fill: var(--station-bg);
            stroke: var(--text-dark);
            stroke-width: 2;
            transition: fill 0.2s ease, stroke 0.2s ease;
            cursor: pointer;
        }

        .station:hover rect, .station:focus rect {
            fill: var(--station-hover);
            stroke: var(--accent);
            outline: none;
        }

        .station text {
            fill: var(--text-dark);
            font-size: 14px;
            font-weight: 600;
            pointer-events: none;
            text-anchor: middle;
            dominant-baseline: middle;
        }

        /* Conveyor Belt Animation */
        .conveyor-path {
            fill: none;
            stroke: var(--conveyor-belt);
            stroke-width: 12;
        }

        .conveyor-dashes {
            fill: none;
            stroke: var(--station-bg);
            stroke-width: 8;
            stroke-dasharray: 10 10;
            animation: moveConveyor 1.5s linear infinite;
        }

        @keyframes moveConveyor {
            from { stroke-dashoffset: 20; }
            to { stroke-dashoffset: 0; }
        }

        /* Modal Styles */
        .modal-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 1000;
        }

        .modal-backdrop.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal {
            background-color: #e0e0e0;
            color: var(--text-dark);
            width: 90%;
            max-width: 500px;
            border-radius: 4px;
            padding: 2rem;
            position: relative;
            transform: translateY(20px);
            transition: transform 0.3s ease;
            border-top: 6px solid var(--accent);
        }

        .modal-backdrop.active .modal {
            transform: translateY(0);
        }

        .close-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #666;
        }

        .close-btn:hover {
            color: var(--text-dark);
        }

        .modal h2 {
            margin-bottom: 0.5rem;
            font-size: 1.5rem;
        }

        .modal p.desc {
            margin-bottom: 1.5rem;
            line-height: 1.4;
            color: #444;
        }

        .tech-stack {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .tech-tag {
            background-color: var(--zone-border);
            color: var(--text-light);
            padding: 0.25rem 0.5rem;
            border-radius: 2px;
            font-size: 0.8rem;
            font-family: monospace;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 0.5rem 1rem;
            text-decoration: none;
            font-weight: bold;
            border-radius: 2px;
            transition: background-color 0.2s;
            font-size: 0.9rem;
            border: 2px solid transparent;
        }

        .btn-primary {
            background-color: var(--accent);
            color: var(--text-light);
        }

        .btn-primary:hover {
            background-color: #008c93;
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--accent);
            border-color: var(--accent);
        }

        .btn-secondary:hover {
            background-color: rgba(0, 173, 181, 0.1);
        }
    </style>
</head>
<body>

    <header>
        <h1>System Architecture</h1>
        <p class="subtitle">Interactive Blueprint // Select a station to view specs</p>
    </header>

    <div class="factory-container">
        <svg viewBox="0 0 1000 800" xmlns="http://www.w3.org/2000/svg">
            
            <defs>
                <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#333" stroke-width="0.5"/>
                </pattern>
            </defs>
            <rect width="1000" height="800" fill="url(#grid)" />

            <path class="conveyor-path" d="M 370 200 L 580 200" />
            <path class="conveyor-dashes" d="M 370 200 L 580 200" />
            
            <path class="conveyor-path" d="M 180 160 L 180 260 L 250 260" />
            <path class="conveyor-dashes" d="M 180 160 L 180 260 L 250 260" />

            <path class="conveyor-path" d="M 720 200 L 780 200" />
            <path class="conveyor-dashes" d="M 720 200 L 780 200" />

            <path class="conveyor-path" d="M 250 540 L 320 540 L 320 620" />
            <path class="conveyor-dashes" d="M 250 540 L 320 540 L 320 620" />

            <path class="conveyor-path" d="M 720 540 L 780 540" />
            <path class="conveyor-dashes" d="M 720 540 L 780 540" />

            <path class="conveyor-path" d="M 850 240 L 850 500" />
            <path class="conveyor-dashes" d="M 850 240 L 850 500" />


            <rect x="40" y="40" width="420" height="340" class="zone-rect" />
            <text x="60" y="75" class="zone-label">Zone 1: Engine Core</text>
            
            <g class="station" data-id="p1" tabindex="0" role="button">
                <rect x="110" y="120" width="140" height="80" rx="4" />
                <text x="180" y="160">Starship Forge</text>
            </g>
            <g class="station" data-id="p2" tabindex="0" role="button">
                <rect x="250" y="220" width="140" height="80" rx="4" />
                <text x="320" y="260">PixelForge</text>
            </g>

            <rect x="540" y="40" width="420" height="340" class="zone-rect" />
            <text x="560" y="75" class="zone-label">Zone 2: ML Infra</text>

            <g class="station" data-id="p3" tabindex="0" role="button">
                <rect x="580" y="160" width="140" height="80" rx="4" />
                <text x="650" y="200">HyperOuroSLM</text>
            </g>
            <g class="station" data-id="p4" tabindex="0" role="button">
                <rect x="780" y="160" width="140" height="80" rx="4" />
                <text x="850" y="200">Transform GUI</text>
            </g>

            <rect x="40" y="420" width="420" height="340" class="zone-rect" />
            <text x="60" y="455" class="zone-label">Zone 3: Tooling</text>

            <g class="station" data-id="p5" tabindex="0" role="button">
                <rect x="110" y="500" width="140" height="80" rx="4" />
                <text x="180" y="540">Sci-Fi Gen</text>
            </g>
            <g class="station" data-id="p6" tabindex="0" role="button">
                <rect x="250" y="620" width="140" height="80" rx="4" />
                <text x="320" y="660">Pixel Art Tool</text>
            </g>

            <rect x="540" y="420" width="420" height="340" class="zone-rect" />
            <text x="560" y="455" class="zone-label">Zone 4: Execution</text>

            <g class="station" data-id="p7" tabindex="0" role="button">
                <rect x="580" y="500" width="140" height="80" rx="4" />
                <text x="650" y="540">Enterprise Inc.</text>
            </g>
            <g class="station" data-id="p8" tabindex="0" role="button">
                <rect x="780" y="500" width="140" height="80" rx="4" />
                <text x="850" y="540">Necesse Clone</text>
            </g>
        </svg>
    </div>

    <div class="modal-backdrop" id="modalBackdrop">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
            <button class="close-btn" id="closeBtn" aria-label="Close modal">&times;</button>
            <h2 id="modalTitle">Project Name</h2>
            <p class="desc" id="modalDesc">Project description goes here.</p>
            <div class="tech-stack" id="modalStack">
                </div>
            <div class="modal-actions">
                <a href="#" target="_blank" class="btn btn-primary" id="modalRepo">View Source</a>
                <a href="#" target="_blank" class="btn btn-secondary" id="modalCollab">Collaborate</a>
            </div>
        </div>
    </div>

    <script>
        // Project Data Dictionary
        const projectsData = {
            p1: {
                name: "Starship Forge",
                description: "A robust C++ based game engine optimized for 2D space simulations and massive particle systems.",
                stack: ["C++", "OpenGL", "CMake"],
                repo: "https://github.com/yourusername/starship-forge",
                collab: "https://github.com/yourusername/starship-forge/issues"
            },
            p2: {
                name: "PixelForge",
                description: "Lightweight rendering wrapper for rapid prototyping of 2D grid-based games.",
                stack: ["Rust", "WGPU"],
                repo: "https://github.com/yourusername/pixelforge",
                collab: "mailto:your.email@example.com"
            },
            p3: {
                name: "HyperOuroSLM",
                description: "Small Language Model deployment infrastructure tailored for edge devices.",
                stack: ["Python", "PyTorch", "ONNX", "Docker"],
                repo: "https://github.com/yourusername/hyperouroslm",
                collab: "https://github.com/yourusername/hyperouroslm/issues"
            },
            p4: {
                name: "Transformer Training GUI",
                description: "A local desktop interface for monitoring and tweaking transformer model hyperparameters in real-time.",
                stack: ["React", "Electron", "FastAPI"],
                repo: "https://github.com/yourusername/transformer-gui",
                collab: "https://github.com/yourusername/transformer-gui/issues"
            },
            p5: {
                name: "Procedural Sci-Fi Generator",
                description: "Generates seamless space station layouts and hull textures using wave function collapse.",
                stack: ["JavaScript", "Canvas API", "Algorithms"],
                repo: "https://github.com/yourusername/scifi-gen",
                collab: "https://github.com/yourusername/scifi-gen/issues"
            },
            p6: {
                name: "Pixel Art Tooling",
                description: "Command line utility for bulk processing, scaling, and palettizing sprite sheets.",
                stack: ["Go", "CLI"],
                repo: "https://github.com/yourusername/pixel-tools",
                collab: "https://github.com/yourusername/pixel-tools/issues"
            },
            p7: {
                name: "Corporate Enterprise Inc.",
                description: "A satirical incremental browser game about managing an infinitely growing bureaucracy.",
                stack: ["HTML5", "CSS3", "Vanilla JS"],
                repo: "https://github.com/yourusername/enterprise-inc",
                collab: "https://github.com/yourusername/enterprise-inc/issues"
            },
            p8: {
                name: "Necesse Browser Clone",
                description: "A highly optimized browser adaptation of popular top-down survival mechanics.",
                stack: ["TypeScript", "Phaser.io"],
                repo: "https://github.com/yourusername/necesse-clone",
                collab: "https://github.com/yourusername/necesse-clone/issues"
            }
        };

        // DOM Elements
        const stations = document.querySelectorAll('.station');
        const backdrop = document.getElementById('modalBackdrop');
        const closeBtn = document.getElementById('closeBtn');
        
        // Modal Content Elements
        const mTitle = document.getElementById('modalTitle');
        const mDesc = document.getElementById('modalDesc');
        const mStack = document.getElementById('modalStack');
        const mRepo = document.getElementById('modalRepo');
        const mCollab = document.getElementById('modalCollab');

        // Functions
        function openModal(id) {
            const data = projectsData[id];
            if (!data) return;

            mTitle.textContent = data.name;
            mDesc.textContent = data.description;
            
            // Clear and populate stack
            mStack.innerHTML = '';
            data.stack.forEach(tech => {
                const span = document.createElement('span');
                span.className = 'tech-tag';
                span.textContent = tech;
                mStack.appendChild(span);
            });

            mRepo.href = data.repo;
            mCollab.href = data.collab;

            backdrop.classList.add('active');
            closeBtn.focus();
        }

        function closeModal() {
            backdrop.classList.remove('active');
        }

        // Event Listeners
        stations.forEach(station => {
            // Click support
            station.addEventListener('click', () => {
                openModal(station.dataset.id);
            });
            
            // Keyboard accessibility (Enter key)
            station.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    openModal(station.dataset.id);
                }
            });
        });

        // Close via button
        closeBtn.addEventListener('click', closeModal);

        // Close via backdrop click
        backdrop.addEventListener('click', (e) => {
            if (e.target === backdrop) closeModal();
        });

        // Close via Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && backdrop.classList.contains('active')) {
                closeModal();
            }
        });
    </script>
</body>
</html>
